databases:
  - name: checkoutflow-db
    databaseName: checkoutflow
    user: checkoutflow_user
    plan: free

services:
  - type: web
    name: checkoutflow-app
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: checkoutflow-db
          property: connectionString
      - key: SHOPIFY_CLIENT_ID
        value: "add-your-shopify-client-id-here"
      - key: SHOPIFY_CLIENT_SECRET
        value: "add-your-shopify-client-secret-here"
      - key: SHOPIFY_REDIRECT_URI
        value: "https://checkoutflow-app.onrender.com/api/auth/callback"
